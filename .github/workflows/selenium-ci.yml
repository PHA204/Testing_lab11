name: Selenium CI Pipeline

# Trigger: khi nào pipeline chạy
on:
  push:
    branches: [ main ]          # Push lên main
  pull_request:
    branches: [ main ]          # Mở PR vào main
  workflow_dispatch:            # Nút "Run workflow" thủ công trên GitHub UI

jobs:
  run-tests:
    runs-on: ubuntu-latest      # Máy ảo Linux miễn phí của GitHub
  steps:
      # Bước 1: Lấy source code về
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven           # Cache .m2 → lần sau build nhanh hơn

      # Bước 3: Chạy test
      - name: Run Selenium Smoke Tests
        run: |
          mvn clean test \
            -Dbrowser=chrome \
            -Denv=dev \
            -DsuiteXmlFile=testng-smoke.xml
        env:
          # Đọc từ GitHub Secrets (sẽ tạo ở Bài 3)
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      # Bước 4: Upload kết quả khi test FAIL
      - name: Upload test results on failure
        if: failure()            # Chỉ chạy khi có bước bị fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/screenshots/
          retention-days: 30
